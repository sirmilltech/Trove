# Codemagic configuration for Trove iOS Build
# Ref: https://docs.codemagic.io/yaml-publishing/app-store-connect/

workflows:
  ios-release:
    name: Trove iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: troves 
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.milltech.trove.app"
        APP_STORE_APPLE_ID: "6759795263" 
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies and Sync Capacitor
        script: |
          npm install
          # Ensure the web assets are built so Capacitor can sync
          npm run build --if-present
          
          # Sync Capacitor to ensure the /ios folder and Podfile are generated/updated
          npx cap sync ios
          
          # Navigate to the correct directory for Pods
          # If 'npx cap sync' was successful, this directory will exist
          cd ios/App
          pod install
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: Build iOS IPA
        script: |
          # Use the xcode-project build-ipa utility
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"