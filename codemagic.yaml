# Codemagic configuration for Trove iOS Build
# Ensure you have the 'apple_credentials' group in your Environment Variables UI

workflows:
  ios-release:
    name: Trove iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - apple_credentials # Matches the group name in Codemagic UI
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: 6742702737
        BUNDLE_ID: "com.milltech.trove.app"
      node: latest
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: |
          npm install
          cd ios/App && pod install

      - name: Initialize Apple Auth Integration
        script: |
          # This command dynamically creates the "apple_auth" integration 
          # using the variables you added to the UI.
          key_path=$FCI_TEMP_DIR/apple_key.p8
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > $key_path
          
          key-tool install --key "$APP_STORE_CONNECT_PRIVATE_KEY" --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"
          
          # Now we "register" the credentials under the name 'apple_auth'
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@file:$key_path" \
            --create

      - name: Build iOS IPA
        script: |
          # Build the project using the 'apple_auth' we just registered above
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --bundle-id "$BUNDLE_ID"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        # This tells Codemagic to use the credentials we defined in the script
        auth: integration 
        submit_to_testflight: true