# Codemagic configuration for Trove iOS Build
# Ref: https://docs.codemagic.io/yaml-publishing/app-store-connect/

workflows:
  ios-release:
    name: Trove iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    # This links the workflow to your specific 'troves' integration
    integrations:
      app_store_connect: troves 
    environment:
      groups:
        - apple_credentials 
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        # The Bundle ID for your application
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.milltech.trove.app"
        APP_STORE_APPLE_ID: "6759795263" 
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
          cd ios/App && pod install
      - name: Set up code signing
        script: |
          # Keychain and provisioning profile management
          keychain initialize
          # Uses the 'troves' integration automatically to fetch certificates
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        # Use 'integration' to reference the 'troves' defined above
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"